name: Prepare npm release

on:
    workflow_dispatch:
        inputs:
            version:
                description: Target version to prepare, for example 0.2.3
                required: true
                type: string

permissions:
    actions: write
    contents: write

concurrency:
    group: npm-prepare-release
    cancel-in-progress: false

jobs:
    prepare:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0
                  token: ${{ secrets.AUTOFIX_TOKEN || github.token }}

            - uses: actions/setup-node@v7
              with:
                  node-version: '24.x'
                  package-manager-cache: false

            - name: Install dependencies
              run: npm ci

            - name: Verify AUTOFIX_TOKEN
              env:
                  AUTOFIX_TOKEN: ${{ secrets.AUTOFIX_TOKEN }}
              run: |
                  if [[ -z "${AUTOFIX_TOKEN}" ]]; then
                    echo "AUTOFIX_TOKEN is required so release branch pushes trigger test-and-release.yml." >&2
                    exit 1
                  fi

            - name: Configure Git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git branch --set-upstream-to="origin/${GITHUB_REF_NAME}"

            - name: Build
              run: npm run build

            - name: Check syntax
              run: npm run check

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Remember current version
              run: echo "OLD_VERSION=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_ENV"

            - name: Determine version bump
              env:
                  TARGET_VERSION: ${{ inputs.version }}
              run: |
                  BUMP="$(node <<'NODE'
                  const semver = require("semver");

                  const current = require("./package.json").version;
                  const target = process.env.TARGET_VERSION;

                  if (!semver.valid(target)) {
                    throw new Error(`Target version ${target} is not valid semver`);
                  }

                  if (!semver.gt(target, current)) {
                    throw new Error(`Target version ${target} must be greater than current version ${current}`);
                  }

                  const currentVersion = semver.parse(current);
                  const targetVersion = semver.parse(target);

                  let bump;
                  if (
                    currentVersion.prerelease.length > 0 &&
                    targetVersion.major === currentVersion.major &&
                    targetVersion.minor === currentVersion.minor &&
                    targetVersion.patch === currentVersion.patch &&
                    targetVersion.prerelease.length === 0
                  ) {
                    bump = "patch";
                  } else if (
                    targetVersion.major > currentVersion.major &&
                    targetVersion.prerelease.length === 0
                  ) {
                    bump = "major";
                  } else if (
                    targetVersion.major === currentVersion.major &&
                    targetVersion.minor > currentVersion.minor &&
                    targetVersion.prerelease.length === 0
                  ) {
                    bump = "minor";
                  } else if (
                    targetVersion.major === currentVersion.major &&
                    targetVersion.minor === currentVersion.minor &&
                    targetVersion.patch > currentVersion.patch &&
                    targetVersion.prerelease.length === 0
                  ) {
                    bump = "patch";
                  } else {
                    throw new Error(
                      `Target version ${target} must be a later patch, minor, or major version after ${current}`,
                    );
                  }

                  console.log(bump);
                  NODE
                  )"
                  echo "TARGET_VERSION=${TARGET_VERSION}" >> "$GITHUB_ENV"
                  echo "BUMP=${BUMP}" >> "$GITHUB_ENV"

            - name: Prepare release commit
              run: npm run release -- "$BUMP" --yes --all --noPush

            - name: Ensure release commit is complete
              run: |
                  PREPARED_VERSION="$(node -p 'require("./package.json").version')"

                  node <<'NODE'
                  const fs = require("node:fs");

                  const target = process.env.TARGET_VERSION;
                  const prepared = require("./package.json").version;

                  function writeJson(path, data) {
                    fs.writeFileSync(path, `${JSON.stringify(data, null, 4)}\n`);
                  }

                  const packageJson = require("./package.json");
                  packageJson.version = target;
                  writeJson("package.json", packageJson);

                  const packageLock = require("./package-lock.json");
                  packageLock.version = target;
                  packageLock.packages[""].version = target;
                  writeJson("package-lock.json", packageLock);

                  const ioPackage = require("./io-package.json");
                  ioPackage.common.version = target;
                  const news = ioPackage.common.news;
                  if (news[prepared] && prepared !== target) {
                    news[target] = news[prepared];
                    delete news[prepared];
                    ioPackage.common.news = Object.fromEntries(
                      Object.entries(news).sort((left, right) =>
                        right[0].localeCompare(left[0], undefined, { numeric: true }),
                      ),
                    );
                  }
                  writeJson("io-package.json", ioPackage);

                  const readmePath = "README.md";
                  const readme = fs.readFileSync(readmePath, "utf8");
                  fs.writeFileSync(
                    readmePath,
                    readme.replace(new RegExp(`^### ${prepared} \\(([^\\n]+)\\)`, "m"), `### ${target} ($1)`),
                  );
                  NODE

                  VERSION="$(node -p 'require("./package.json").version')"
                  TAG="v${VERSION}"

                  if [[ "$VERSION" != "$TARGET_VERSION" ]]; then
                    echo "Prepared version ${VERSION}, expected ${TARGET_VERSION}" >&2
                    exit 1
                  fi

                  if [[ "$VERSION" == "$OLD_VERSION" ]]; then
                    echo "Release version did not change from ${OLD_VERSION}" >&2
                    exit 1
                  fi

                  if grep -Fq "### **WORK IN PROGRESS**" README.md; then
                    echo "README.md still contains the WORK IN PROGRESS changelog placeholder" >&2
                    exit 1
                  fi

                  npm install --package-lock-only --ignore-scripts
                  npm run format

                  if [[ -n "$(git status --porcelain)" ]]; then
                    git add -A
                    git commit -m "chore: release ${TAG}"
                  fi

                  COMMITTED_VERSION="$(git show HEAD:package.json | node -e 'let s = ""; process.stdin.on("data", d => s += d).on("end", () => console.log(JSON.parse(s).version));')"
                  if [[ "$COMMITTED_VERSION" != "$VERSION" ]]; then
                    echo "HEAD contains package version ${COMMITTED_VERSION}, but working tree contains ${VERSION}" >&2
                    exit 1
                  fi

                  COMMITTED_LOCK_VERSION="$(git show HEAD:package-lock.json | node -e 'let s = ""; process.stdin.on("data", d => s += d).on("end", () => { const lock = JSON.parse(s); console.log(`${lock.version} ${lock.packages[""].version}`); });')"
                  if [[ "$COMMITTED_LOCK_VERSION" != "$VERSION $VERSION" ]]; then
                    echo "HEAD contains package-lock versions ${COMMITTED_LOCK_VERSION}, expected ${VERSION} ${VERSION}" >&2
                    exit 1
                  fi

            - name: Push release branch
              run: |
                  TAG="v$(node -p 'require("./package.json").version')"
                  BRANCH="release/${TAG}"
                  RELEASE_SHA="$(git rev-parse HEAD)"
                  if git rev-parse --verify --quiet "refs/tags/${TAG}"; then
                    git tag -d "$TAG"
                  fi
                  git fetch origin "${BRANCH}" || true
                  git push --force-with-lease origin "HEAD:refs/heads/${BRANCH}"
                  {
                    echo "TAG=${TAG}"
                    echo "BRANCH=${BRANCH}"
                    echo "RELEASE_SHA=${RELEASE_SHA}"
                  } >> "$GITHUB_ENV"

            - name: Wait for release branch checks
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  started_at="$(date +%s)"

                  while true; do
                    run="$(gh run list \
                      --workflow test-and-release.yml \
                      --branch "${BRANCH}" \
                      --event push \
                      --json conclusion,createdAt,databaseId,headSha,status,url \
                      --limit 20 \
                      --jq ".[] | select(.headSha == \"${RELEASE_SHA}\" and (.createdAt | fromdateiso8601) >= ${started_at}) | @base64" \
                      | head -n 1)"

                    if [[ -n "${run}" ]]; then
                      status="$(echo "${run}" | base64 --decode | jq -r ".status")"
                      conclusion="$(echo "${run}" | base64 --decode | jq -r ".conclusion")"
                      url="$(echo "${run}" | base64 --decode | jq -r ".url")"

                      echo "test-and-release.yml for ${BRANCH} is ${status}: ${url}"

                      if [[ "${status}" == "completed" ]]; then
                        if [[ "${conclusion}" == "success" ]]; then
                          exit 0
                        fi
                        echo "test-and-release.yml for ${BRANCH} completed with ${conclusion}: ${url}" >&2
                        exit 1
                      fi
                    else
                      echo "Waiting for test-and-release.yml for ${BRANCH} at ${RELEASE_SHA}..."
                    fi

                    if (( $(date +%s) - started_at > 900 )); then
                      echo "Timed out waiting for test-and-release.yml for ${BRANCH}." >&2
                      exit 1
                    fi

                    sleep 10
                  done

            - name: Write summary
              run: |
                  {
                    echo "Prepared ${TAG} on branch ${BRANCH}."
                    echo "The test-and-release workflow completed successfully for ${BRANCH}."
                    echo ""
                    echo "Review and adjust the release branch before running the npm publish workflow."
                    echo "Use version ${TAG#v} and ref ${BRANCH} when publishing."
                  } >> "$GITHUB_STEP_SUMMARY"
