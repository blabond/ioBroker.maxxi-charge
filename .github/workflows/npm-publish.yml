name: Publish to npm

on:
    workflow_dispatch:
        inputs:
            ref:
                description: Release branch or ref to publish, e.g. release/v0.2.2
                required: true
                default: main
                type: string
            version:
                description: Version to publish, without leading v
                required: true
                type: string

permissions:
    contents: write
    id-token: write

concurrency:
    group: npm-publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm-publish

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref }}

            - uses: actions/setup-node@v6
              with:
                  node-version: '24.x'
                  registry-url: 'https://registry.npmjs.org'
                  package-manager-cache: false

            - name: Install dependencies
              run: npm ci

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Validate package version
              run: |
                  EXPECTED_VERSION="${{ inputs.version }}"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if [ "${PACKAGE_VERSION}" != "${EXPECTED_VERSION}" ]; then
                    echo "package.json version ${PACKAGE_VERSION} does not match requested version ${EXPECTED_VERSION}."
                    exit 1
                  fi

                  echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_ENV}"

            - name: Create release tag if missing
              run: |
                  TAG="v${PACKAGE_VERSION}"
                  COMMIT="$(git rev-parse HEAD)"

                  git fetch --force --tags origin

                  if git rev-parse "${TAG}" >/dev/null 2>&1; then
                    TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
                    if [ "${TAG_COMMIT}" != "${COMMIT}" ]; then
                      echo "Tag ${TAG} already exists, but it does not point to the current commit."
                      exit 1
                    fi
                    echo "Tag ${TAG} already exists on the current commit."
                  else
                    git tag -a "${TAG}" -m "${TAG}"
                    git push origin "refs/tags/${TAG}"
                  fi

            - name: Verify release tag
              run: npm run release:verify-tag

            - name: Build
              run: npm run build

            - name: Check syntax
              run: npm run check

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Publish package
              run: npm publish --access public

            - name: Merge release commit back to main
              run: |
                  RELEASE_SHA="$(git rev-parse HEAD)"

                  git reset --hard "${RELEASE_SHA}"
                  git clean -fd -- admin/custom

                  git fetch origin main
                  git checkout -B main origin/main
                  git merge --no-edit "${RELEASE_SHA}"

                  node --input-type=module <<'EOF'
                  import { readFileSync, writeFileSync } from 'node:fs';

                  const readmePath = 'README.md';
                  const marker = '### **WORK IN PROGRESS**';
                  const readme = readFileSync(readmePath, 'utf8');

                  if (!readme.includes(marker)) {
                      const changelog = '## Changelog';
                      const index = readme.indexOf(changelog);

                      if (index === -1) {
                          throw new Error('README.md does not contain a ## Changelog heading.');
                      }

                      const insertAt = index + changelog.length;
                      const next = `${readme.slice(0, insertAt)}\n\n${marker}${readme.slice(insertAt)}`;
                      writeFileSync(readmePath, next);
                  }
                  EOF

                  if [ -n "$(git status --porcelain README.md)" ]; then
                    git add README.md
                    git commit -m "chore: start next changelog"
                  fi

                  git push origin main
