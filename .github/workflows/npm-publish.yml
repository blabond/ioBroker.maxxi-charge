name: Publish to npm

on:
    workflow_dispatch:
        inputs:
            ref:
                description: Optional release branch, commit, or tag to publish. Defaults to release/v<version>
                required: false
                default: ''
                type: string
            version:
                description: Version to publish, for example 0.2.2
                required: true
                type: string

permissions:
    actions: write
    contents: write
    id-token: write

concurrency:
    group: npm-publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm-publish
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ inputs.ref || format('release/v{0}', inputs.version) }}
                  fetch-depth: 0
                  token: ${{ secrets.AUTOFIX_TOKEN || github.token }}

            - uses: actions/setup-node@v6
              with:
                  node-version: '24.x'
                  registry-url: 'https://registry.npmjs.org'
                  package-manager-cache: false

            - name: Install dependencies
              run: npm ci

            - name: Verify AUTOFIX_TOKEN
              env:
                  AUTOFIX_TOKEN: ${{ secrets.AUTOFIX_TOKEN }}
              run: |
                  if [[ -z "${AUTOFIX_TOKEN}" ]]; then
                    echo "AUTOFIX_TOKEN is required so release tag and main pushes trigger workflows." >&2
                    exit 1
                  fi

            - name: Configure Git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Create release tag
              env:
                  EXPECTED_VERSION: ${{ inputs.version }}
              run: |
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"
                  if [[ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]]; then
                    echo "Expected package version ${EXPECTED_VERSION}, got ${PACKAGE_VERSION}" >&2
                    exit 1
                  fi

                  TAG="v${PACKAGE_VERSION}"
                  if git rev-parse --verify --quiet "refs/tags/${TAG}"; then
                    TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
                    HEAD_COMMIT="$(git rev-parse HEAD)"
                    if [[ "$TAG_COMMIT" != "$HEAD_COMMIT" ]]; then
                      echo "Tag ${TAG} exists but does not point at HEAD" >&2
                      exit 1
                    fi
                  else
                    git tag -a "$TAG" -m "$TAG"
                    git push origin "refs/tags/${TAG}"
                  fi
                  echo "TAG=${TAG}" >> "$GITHUB_ENV"
                  echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
                  echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

            - name: Verify release tag
              run: npm run release:verify-tag

            - name: Wait for release tag checks
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  while true; do
                    run="$(gh run list \
                      --workflow test-and-release.yml \
                      --branch "${TAG}" \
                      --event push \
                      --json conclusion,databaseId,headSha,status,url \
                      --limit 20 \
                      --jq ".[] | select(.headSha == \"${RELEASE_SHA}\") | @base64" \
                      | head -n 1)"

                    if [[ -n "${run}" ]]; then
                      status="$(echo "${run}" | base64 --decode | jq -r ".status")"
                      conclusion="$(echo "${run}" | base64 --decode | jq -r ".conclusion")"
                      url="$(echo "${run}" | base64 --decode | jq -r ".url")"

                      echo "test-and-release.yml for ${TAG} is ${status}: ${url}"

                      if [[ "${status}" == "completed" ]]; then
                        if [[ "${conclusion}" == "success" ]]; then
                          exit 0
                        fi
                        echo "test-and-release.yml for ${TAG} completed with ${conclusion}: ${url}" >&2
                        exit 1
                      fi
                    else
                      echo "Waiting for test-and-release.yml push run for ${TAG} at ${RELEASE_SHA}..."
                    fi

                    sleep 10
                  done

            - name: Build
              run: npm run build

            - name: Check syntax
              run: npm run check

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Publish package
              run: |
                  PACKAGE_NAME="$(node -p 'require("./package.json").name')"
                  PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
                  PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)"

                  if [[ "$PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]]; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Skipping npm publish."
                  else
                    npm publish --access public
                  fi

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  node <<'NODE'
                  const fs = require("node:fs");
                  const path = require("node:path");

                  const version = process.env.PACKAGE_VERSION;
                  const readme = fs.readFileSync("README.md", "utf8");
                  const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                  const pattern = new RegExp(
                    `^### ${escapedVersion} \\([^\\n]+\\)\\n\\n([\\s\\S]*?)(?=\\n### |\\n\\[Older changelogs|\\n## |$)`,
                    "m",
                  );
                  const match = readme.match(pattern);
                  const notes = match ? match[1].trim() : `Release v${version}`;
                  fs.writeFileSync(path.join(process.env.RUNNER_TEMP, "release-notes.md"), `${notes}\n`);
                  NODE

                  release_flags=(--title "Release ${TAG}" --notes-file "${RUNNER_TEMP}/release-notes.md")
                  if [[ "${PACKAGE_VERSION}" == *-* ]]; then
                    release_flags+=(--prerelease)
                  else
                    release_flags+=(--latest)
                  fi

                  if gh release view "${TAG}" >/dev/null 2>&1; then
                    gh release edit "${TAG}" "${release_flags[@]}"
                  else
                    gh release create "${TAG}" "${release_flags[@]}"
                  fi

            - name: Merge published release back to main
              run: |
                  RELEASE_SHA="$(git rev-parse HEAD)"

                  git reset --hard "$RELEASE_SHA"
                  git clean -fd -- admin/custom

                  git fetch origin main
                  git checkout -B main origin/main
                  git merge --no-edit "$RELEASE_SHA"

                  node <<'NODE'
                  const fs = require("node:fs");

                  const readmePath = "README.md";
                  const readme = fs.readFileSync(readmePath, "utf8");

                  if (!readme.includes("### **WORK IN PROGRESS**")) {
                    const changelogHeading = /^## Changelog\n+/m;
                    if (!changelogHeading.test(readme)) {
                      throw new Error("Could not find README changelog section");
                    }

                    fs.writeFileSync(
                      readmePath,
                      readme.replace(
                        changelogHeading,
                        "## Changelog\n\n### **WORK IN PROGRESS**\n\n",
                      ),
                    );
                  }
                  NODE

                  if [[ -n "$(git status --porcelain)" ]]; then
                    git add README.md
                    git commit -m "chore: start next changelog"
                  fi

                  git push origin main
