name: Test and Release

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - 'release/v*'
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'
            - 'v[0-9]+.[0-9]+.[0-9]+-**'
    pull_request: {}

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    autofix:
        name: Auto-fix ESLint/Prettier
        if: |
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            contains(github.event.head_commit.message, '[skip ci]') == false
        runs-on: ubuntu-latest
        concurrency:
            group: autofix-${{ github.ref }}
            cancel-in-progress: false
        permissions:
            contents: write
        outputs:
            changed: ${{ steps.commit.outputs.changed }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  token: ${{ secrets.AUTOFIX_TOKEN || github.token }}

            - uses: actions/setup-node@v6
              with:
                  node-version: '24.x'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Apply ESLint auto-fixes
              run: npm run lint:fix

            - name: Apply Prettier formatting
              run: npm run format

            - name: Commit and push fixes if needed
              id: commit
              run: |
                  if [ -n "$(git status --porcelain)" ]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add -A
                    git commit -m "chore(ci): apply eslint/prettier auto-fixes"
                    git push origin "HEAD:${GITHUB_REF_NAME}"
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "No formatting/lint fixes needed."
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  fi

    check-and-lint:
        needs: [autofix]
        if: |
            always() &&
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            (needs.autofix.result == 'skipped' || needs.autofix.outputs.changed == 'false')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: '24.x'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check types
              run: npm run check

            - name: Lint source code
              run: npm run lint

            - name: Run tests
              run: npm test

            - name: Check formatting
              run: npm run format:check

            - name: Security audit
              run: npm audit --omit=dev

    adapter-tests:
        needs: [check-and-lint]
        if: contains(github.event.head_commit.message, '[skip ci]') == false
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                node-version: [22.x, 24.x]
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: ioBroker/testing-action-adapter@v1
              with:
                  node-version: ${{ matrix.node-version }}
                  os: ${{ matrix.os }}

    deploy:
        needs: [check-and-lint, adapter-tests]
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            github.event_name == 'push' &&
            startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: ioBroker/testing-action-deploy@v1
              with:
                  node-version: '24.x'
                  github-token: ${{ secrets.GITHUB_TOKEN }}
